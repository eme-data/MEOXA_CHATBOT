services:
  chatbot:
    build: .
    container_name: meoxa-chatbot
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./config:/app/config
    environment:
      - HOST=0.0.0.0
      - PORT=8000

  nginx:
    image: nginx:alpine
    container_name: meoxa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - chatbot

  certbot:
    image: certbot/certbot
    container_name: meoxa-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
